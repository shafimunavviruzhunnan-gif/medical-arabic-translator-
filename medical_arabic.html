

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medical Arabic Translator</title>
<style>
body{font-family:Arial;max-width:700px;margin:40px auto;padding:20px;background:#f0f4f8}
h1{color:#2c3e50;text-align:center}
textarea{width:100%;height:100px;padding:10px;font-size:16px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
input[type=button]{background:#2980b9;color:white;padding:12px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}
#result{background:white;padding:20px;border-radius:8px;margin-top:20px;font-size:18px;direction:rtl;min-height:50px}
#status{color:#555;margin-top:10px}
</style>
</head>
<body>
<h1>Medical Arabic Translator</h1>
<p>Type medical question in English:</p>
<textarea id="txt" placeholder="e.g. Do you have chest pain?"></textarea>
<br>
<input type="button" value="Translate and Speak Arabic" onclick="run()">
<div id="status"></div>
<div id="result"></div>
<script>
var okey = "sk-proj-dMmyCTIBngLdmZLqghLXlDaxM4Of2PXybFuYlJZm2q2n8EuT4jcIyI4hAuUyM_-uSDVVryfXLAT3BlbkFJfNx9Tp8Z9ZOXz_Vwmq8M18ZzZaJXcxCRrYcN";
var ekey = "sk_83a44b482c510765744b72764582dfef9571096edb05bc67";

function run() {
  var txt = document.getElementById("txt").value;
  if (!txt) { alert("Please type something!"); return; }
  document.getElementById("status").innerHTML = "Translating...";
  document.getElementById("result").innerHTML = "";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.openai.com/v1/chat/completions");
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("Authorization", "Bearer " + okey);
  xhr.onload = function() {
    var res = JSON.parse(xhr.responseText);
    var arabic = res.choices[0].message.content;
    document.getElementById("result").innerHTML = arabic;
    document.getElementById("status").innerHTML = "Generating voice...";
    speak(arabic);
  };
  xhr.onerror = function() {
    document.getElementById("status").innerHTML = "Error!";
  };
  xhr.send(JSON.stringify({
    model: "gpt-4o-mini",
    messages: [{
      role: "user",
      content: "Translate to Gulf Arabic spoken dialect only, never Fusha. Doctor question then typical patient reply.\n\nText: " + txt
    }]
  }));
}

function speak(text) {
  var xhr2 = new XMLHttpRequest();
  xhr2.open("POST", "https://api.elevenlabs.io/v1/text-to-speech/21m00Tcm4TlvDq8ikWAM");
  xhr2.setRequestHeader("Content-Type", "application/json");
  xhr2.setRequestHeader("xi-api-key", ekey);
  xhr2.responseType = "blob";
  xhr2.onload = function() {
    var url = URL.createObjectURL(xhr2.response);
    new Audio(url).play();
    document.getElementById("status").innerHTML = "Done! Playing Arabic audio...";
  };
  xhr2.onerror = function() {
    document.getElementById("status").innerHTML = "Voice error - but translation shown above!";
  };
  xhr2.send(JSON.stringify({
    text: text,
    model_id: "eleven_multilingual_v2",
    voice_settings: {stability: 0.5, similarity_boost: 0.75}
  }));
}
</script>
</body>
</html>
